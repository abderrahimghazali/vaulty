name: Vaulty

options:
  bundleIdPrefix: com.vaulty
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    PRODUCT_BUNDLE_IDENTIFIER: com.vaulty.desktop

targets:
  Vaulty:
    type: application
    platform: macOS
    sources:
      - Vaulty
    info:
      path: Vaulty/Info.plist
      properties:
        CFBundleDisplayName: Vaulty
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: true
        INFOPLIST_FILE: Vaulty/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
